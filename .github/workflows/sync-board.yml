name: Sync Public Board from Notion

on:
  schedule:
    - cron: '0 3 * * *'   # 3am UTC every night
  workflow_dispatch:        # also manually triggerable

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync board data from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python .github/scripts/sync_board.py

      - name: Commit and push if changed
        run: |
          git config user.name  "Class Hub Bot"
          git config user.email "lmunurseanesthesia2028@gmail.com"
          git add class-hub/board-data.json
          if git diff --staged --quiet; then
            echo "Board data unchanged."
          else
            git commit -m "Sync public board from Notion"
            git push
          fi
